<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Guy Code Bridge</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 12px;
        padding: 12px;
        width: 240px;
        margin: 0;
        color: #1a1a1a;
      }
      h1 { margin: 0 0 6px; font-size: 14px; }
      .row { display: flex; align-items: center; gap: 6px; margin: 6px 0; }
      .dot { width: 8px; height: 8px; border-radius: 50%; }
      .ok { background: #2ea043; }
      .bad { background: #cf222e; }
      code { font-family: ui-monospace, Consolas, monospace; background: #f4f4f4; padding: 1px 4px; border-radius: 3px; }
      p { margin: 6px 0; line-height: 1.4; }
    </style>
  </head>
  <body>
    <h1>Guy Code Bridge</h1>
    <div class="row">
      <span id="dot" class="dot bad"></span>
      <span id="status">Checking…</span>
    </div>
    <p>This extension lets the Guy Code desktop app read and drive your browser tabs (Chrome or Edge).</p>
    <p>It connects to <code>127.0.0.1:9223</code> when the app is running. Open Settings → Browser connector in Guy Code to use it.</p>
    <script src="popup.js"></script>
  </body>
</html>
